x-web-common: &web-common
  build:
    context: .
    args:
      RUBY_VERSION: 3.3.10
  image: member_manager_web:latest
  env_file:
    - .env
  volumes:
    - .:/rails
    - ./tmp/access:/tmp/access

x-db-env-dev: &db-env-dev
  RAILS_ENV: development
  DB_HOST: db
  DB_USERNAME: postgres
  DB_PASSWORD: postgres
  DB_PORT: 5432
  DATABASE_URL: postgres://postgres:postgres@db:5432/member_manager_development
  REDIS_URL: redis://redis:6379/0
  # Bearer token for Authentik API (service account). Required at boot unless running tests.
  AUTHENTIK_TOKEN: ${AUTHENTIK_TOKEN:-}

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: member_manager_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
#    sysctls:
#      - vm.overcommit_memory=1
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    <<: *web-common
    command: ./bin/rails server -b 0.0.0.0 -p 3000
    environment:
      <<: *db-env-dev
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis

  sidekiq:
    <<: *web-common
    command: bundle exec sidekiq
    environment:
      <<: *db-env-dev
    depends_on:
      - db
      - redis

  # Run database migrations against the development database.
  # Usage: docker compose run --rm migrate
  migrate:
    <<: *web-common
    command: bin/rails db:migrate
    profiles: ["tools"]
    environment:
      <<: *db-env-dev
    depends_on:
      - db

  # Run the full test suite.
  # Creates and loads the test database schema before running tests.
  # Usage: docker compose run --rm test
  #        docker compose run --rm test bin/rails test test/models/interest_test.rb
  test:
    <<: *web-common
    command: sh -c "bin/rails db:create db:schema:load && bin/rails test"
    profiles: ["test"]
    environment:
      RAILS_ENV: test
      DB_HOST: db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_PORT: 5432
      DATABASE_URL: postgres://postgres:postgres@db:5432/member_manager_test
      REDIS_URL: redis://redis:6379/0
      SKIP_CSS_BUILD: "1"
      AUTHENTIK_TOKEN: test-placeholder-token
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  redis_data:
