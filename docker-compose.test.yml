# Test suite with dedicated Postgres + Redis (for humans and automation).
# Uses a thin Ruby image, bind-mounts the repo at /rails, and caches gems in a
# named volume. Each run installs changed gems and recreates the test database.
# Usage: docker compose -f docker-compose.test.yml run --rm test
#        docker compose -f docker-compose.test.yml run --rm test bin/rails test test/models/member_test.rb
name: membermanager-test

x-web-common: &web-common
  build:
    context: .
    dockerfile: Dockerfile.test
    args:
      RUBY_VERSION: "3.3.11"
  image: member_manager_test:latest
  env_file:
    - .env
  volumes:
    - .:/rails
    - ./tmp/access:/tmp/access
    - test_bundle:/usr/local/bundle

services:
  db:
    image: postgres:16-alpine
    container_name: membermanager-test-postgres
    environment:
      POSTGRES_DB: member_manager_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    tmpfs:
      - /var/lib/postgresql/data
#    ports:
#      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d member_manager_test"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: membermanager-test-redis
    command: redis-server --save "" --appendonly no
#    ports:
#      - "6380:6379"
    tmpfs:
      - /data

  test:
    <<: *web-common
    entrypoint: ["bin/docker-test-entrypoint"]
    command: ["bin/rails", "test"]
    environment:
      RAILS_ENV: test
      DB_HOST: db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_PORT: 5432
      DATABASE_URL: postgres://postgres:postgres@db:5432/member_manager_test
      REDIS_URL: redis://redis:6379/0
      SKIP_CSS_BUILD: "1"
      AUTHENTIK_TOKEN: test-placeholder-token
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  test_bundle:
