name: Release - Manual Tag Rebuild

# Manual utility only.
# Production release/version authority lives in production.yml.
# This workflow rebuilds an existing tag image and never mutates VERSION.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to rebuild (e.g. v1.2.3)"
        required: true
        type: string

concurrency:
  group: release-manual-${{ github.event.inputs.tag }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
      ref: ${{ steps.validate.outputs.ref }}
    steps:
      - name: Validate requested tag
        id: validate
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-hf[0-9]+)?$ ]]; then
            echo "::error::Tag must match vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-hfN."
            exit 1
          fi
          echo "ref=refs/tags/$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Ensure tag exists on origin
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag }}"
          if ! git ls-remote --exit-code --tags "https://github.com/${{ github.repository }}.git" "refs/tags/$TAG" >/dev/null; then
            echo "::error::Tag '$TAG' does not exist on origin."
            exit 1
          fi

  build-and-push:
    needs: preflight
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/member-manager
      APP_VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - name: Checkout requested tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          file: Dockerfile
          platforms: linux/amd64
          provenance: false
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.APP_VERSION }}
