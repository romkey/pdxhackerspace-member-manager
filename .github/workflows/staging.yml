name: Staging - Build and Push Image

# Build when a PR is merged into staging — not on push to staging (avoids coupling
# to unrelated pushes while a staging→main release PR is open) and not when validating
# a PR whose base is main. Optional manual rebuild via workflow_dispatch.
on:
  pull_request:
    types: [closed]
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: staging-${{ github.event.pull_request.merge_commit_sha || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    # Do not build when a release/* branch merges (disallowed into staging; defense in depth).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request && github.event.pull_request.merged == true &&
       !startsWith(github.event.pull_request.head_ref, 'release/'))

    runs-on: ubuntu-latest

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/member-manager

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || 'staging' }}

      - name: Read VERSION and set image tags
        id: meta
        run: |
          APP_VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          file: Dockerfile
          platforms: linux/amd64
          provenance: false
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}-staging
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
