name: ci

on:
  pull_request:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: member_manager_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      AUTHENTIK_API_TOKEN: ci-test-placeholder
      DB_HOST: localhost
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_PORT: 5432
      REDIS_URL: redis://localhost:6379/0

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect VERSION-only main PR
        id: version_only_main
        env:
          BASE_REF: ${{ github.base_ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          CHANGED_FILES=$(git diff --name-only "$BASE_SHA...$HEAD_SHA")
          CHANGED_COUNT=$(printf '%s\n' "$CHANGED_FILES" | sed '/^$/d' | wc -l | tr -d ' ')
          if [ "$BASE_REF" = "main" ] && [ "$CHANGED_COUNT" -eq 1 ] && [ "$CHANGED_FILES" = "VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Main PR only changes VERSION - skipping lint/tests."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip CI notice
        if: steps.version_only_main.outputs.skip == 'true'
        run: echo "CI skipped for VERSION-only PR into main."

      - name: Set up Ruby
        if: steps.version_only_main.outputs.skip != 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.11'
          bundler-cache: true

      - name: Set up Node.js
        if: steps.version_only_main.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install JS dependencies
        if: steps.version_only_main.outputs.skip != 'true'
        run: yarn install --frozen-lockfile

      - name: Lint (RuboCop)
        if: steps.version_only_main.outputs.skip != 'true'
        run: bundle exec rubocop

      - name: Type check
        if: steps.version_only_main.outputs.skip != 'true'
        run: |
          # No standalone type checker (e.g. tsc) in this repo; Rails + Ruby only.
          echo "Type check skipped — not applicable."

      - name: Prepare database
        if: steps.version_only_main.outputs.skip != 'true'
        run: bin/rails db:test:prepare

      - name: Run tests
        if: steps.version_only_main.outputs.skip != 'true'
        run: bin/rails test
