name: Production - Build and Push Image

# Runs on pushes to main.
# Builds only for merges from release/* or hotfix/* where VERSION changed
# in that merge commit. VERSION is manually managed in PRs.

on:
  push:
    branches: [main]

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      action: ${{ steps.resolve.outputs.action }}
      merge_branch: ${{ steps.resolve.outputs.merge_branch }}
      app_version: ${{ steps.resolve.outputs.app_version }}
      major: ${{ steps.resolve.outputs.major }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve workflow action early
        id: resolve
        run: |
          set -euo pipefail

          HEAD_MSG="${{ github.event.head_commit.message }}"
          MSG_FIRST=$(printf '%s\n' "$HEAD_MSG" | head -1)
          MERGE_BRANCH=""
          REST=""

          if [[ "$MSG_FIRST" =~ ^Merge\ pull\ request\ #[0-9]+\ from\ (.+)$ ]]; then
            REST="${BASH_REMATCH[1]}"
          fi

          if [[ -n "$REST" ]] && [[ "$REST" =~ ^([^/:]+)[:/](.+)$ ]]; then
            MERGE_BRANCH="${BASH_REMATCH[2]}"
          fi

          if [ -z "$MERGE_BRANCH" ]; then
            echo "No merge source branch in commit subject; skipping."
            echo "action=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$MERGE_BRANCH" in
            staging)
              echo "staging->main merge: no production image build."
              echo "action=skip" >> "$GITHUB_OUTPUT"
              echo "merge_branch=$MERGE_BRANCH" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
            release/*|hotfix/*)
              ;;
            *)
              echo "Merge source '$MERGE_BRANCH' is not release/* or hotfix/*; skipping."
              echo "action=skip" >> "$GITHUB_OUTPUT"
              echo "merge_branch=$MERGE_BRANCH" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          CHANGED_FILES=$(git diff --name-only HEAD^1 HEAD)
          if ! printf '%s\n' "$CHANGED_FILES" | grep -qx 'VERSION'; then
            echo "::error::Merge from '$MERGE_BRANCH' did not change VERSION. Releases must bump VERSION in the PR."
            exit 1
          fi

          CURR_RAW=$(cat VERSION | tr -d '[:space:]')
          CURR="${CURR_RAW#v}"
          if [[ ! "$CURR" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-hf[0-9]+)?$ ]]; then
            echo "::error::VERSION must be MAJOR.MINOR.PATCH[-hfN] with optional leading v; got '$CURR_RAW'."
            exit 1
          fi

          MAJOR="${CURR%%.*}"
          echo "merge_branch=$MERGE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "action=build" >> "$GITHUB_OUTPUT"
          echo "app_version=$CURR" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: preflight
    if: needs.preflight.outputs.action == 'build'
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/member-manager
      APP_VERSION: ${{ needs.preflight.outputs.app_version }}
      MAJOR: ${{ needs.preflight.outputs.major }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          file: Dockerfile
          platforms: linux/amd64
          provenance: false
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.APP_VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.MAJOR }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create and push git tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --tags origin "refs/tags/v${APP_VERSION}" | grep -q .; then
            echo "Tag v${APP_VERSION} already exists on origin, skipping."
          else
            git tag "v${APP_VERSION}"
            git push origin "v${APP_VERSION}"
          fi

  skipped:
    needs: preflight
    if: needs.preflight.outputs.action == 'skip'
    runs-on: ubuntu-latest
    steps:
      - name: No-op
        run: echo "Production workflow skipped for this merge type."
