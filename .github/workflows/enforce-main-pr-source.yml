# Blocks pull requests into main unless the head branch is staging or hotfix/*.
# Add this workflow as a required status check on main (branch protection / rulesets)
# so merges cannot proceed when it fails.

name: Enforce main PR source branch

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main]

permissions:
  contents: read

jobs:
  allowed-source:
    runs-on: ubuntu-latest
    steps:
      - name: Require staging or hotfix/* as merge source
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [ "$HEAD_REF" = "staging" ]; then
            echo "OK: merging \`staging\` into \`main\`."
            exit 0
          fi
          case "$HEAD_REF" in
            hotfix/*)
              echo "OK: merging hotfix branch \`$HEAD_REF\` into \`main\`."
              exit 0
              ;;
          esac
          echo "::error::Pull requests into \`main\` must come from \`staging\` or a branch whose name starts with \`hotfix/\`. This PR is from \`$HEAD_REF\`."
          exit 1
