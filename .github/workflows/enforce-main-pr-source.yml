# When the merge target is main, the head branch must be staging or hotfix/*.
# For any other base branch (e.g. staging), this workflow succeeds without enforcing.
#
# Add as a required status check only for main, or list additional base branches below
# so the job runs and reports success when enforcement is skipped.

name: Enforce main PR source branch

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main, staging]

permissions:
  contents: read

jobs:
  allowed-source:
    runs-on: ubuntu-latest
    steps:
      - name: Require staging or hotfix/* when merging to main
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [ "$BASE_REF" != "main" ]; then
            echo "Skipping: PR targets \`$BASE_REF\` — staging/hotfix source is only enforced for PRs into \`main\`."
            exit 0
          fi
          if [ "$HEAD_REF" = "staging" ]; then
            echo "OK: merging \`staging\` into \`main\`."
            exit 0
          fi
          case "$HEAD_REF" in
            hotfix/*)
              echo "OK: merging hotfix branch \`$HEAD_REF\` into \`main\`."
              exit 0
              ;;
          esac
          echo "::error::Pull requests into \`main\` must come from \`staging\` or a branch whose name starts with \`hotfix/\`. This PR is from \`$HEAD_REF\`."
          exit 1
