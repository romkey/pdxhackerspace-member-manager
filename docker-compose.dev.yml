# Local development: Rails + Sidekiq + Postgres + Redis (all-in-one for humans).
# Usage: docker compose -f docker-compose.dev.yml up --build
#        docker compose -f docker-compose.dev.yml --profile tools run --rm migrate
name: membermanager-dev

x-web-common: &web-common
  build:
    context: .
    args:
      RUBY_VERSION: 3.3.11
  image: member_manager_web:latest
  env_file:
    - .env
  volumes:
    - .:/rails
    - ./tmp/access:/tmp/access

x-db-env-dev: &db-env-dev
  RAILS_ENV: development
  DB_HOST: db
  DB_USERNAME: postgres
  DB_PASSWORD: postgres
  DB_PORT: 5432
  DATABASE_URL: postgres://postgres:postgres@db:5432/member_manager_development
  REDIS_URL: redis://redis:6379/0
  # Bearer token for Authentik API (service account). Required at boot unless running tests.
  AUTHENTIK_API_TOKEN: ${AUTHENTIK_API_TOKEN:-}

services:
  db:
    image: postgres:18-alpine
    container_name: membermanager-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: member_manager_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data
#    ports:
#      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: membermanager-dev-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
#    ports:
#      - "6379:6379"
    volumes:
      - dev_redis_data:/data

  web:
    <<: *web-common
    command: ./bin/rails server -b 0.0.0.0 -p 3000
    environment:
      <<: *db-env-dev
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis

  sidekiq:
    <<: *web-common
    command: bundle exec sidekiq
    environment:
      <<: *db-env-dev
    depends_on:
      - db
      - redis

  migrate:
    <<: *web-common
    command: bin/rails db:migrate
    profiles: [tools]
    environment:
      <<: *db-env-dev
    depends_on:
      - db

